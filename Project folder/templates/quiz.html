<!DOCTYPE html>
<html>

<head>

<title>Quiz</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="navbar">

<a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('logout') }}">Logout</a>

</div>

<div class="container">

<h3>Time Left: <span id="timer">05:00</span></h3>

<h2>Question {{ qnum + 1 }} of {{ total }}</h2>

<form method="POST">

<p><b>{{ question.question }}</b></p>

{% for option in question.options %}

<input type="radio" name="answer" value="{{ option }}" required>
{{ option }} <br>

{% endfor %}

<br>

<button type="submit">Next</button>

</form>

<hr>

<h3>Question Panel</h3>

<div class="question-panel">

{% for i in range(total) %}

<a href="/quiz/{{ i }}">
<button 
type="button"
class="{% if session['answers'] and session['answers'].get(i|string) %}answered{% else %}unanswered{% endif %}">
{{ i + 1 }}
</button>
</a>

{% endfor %}

</div>

<br><br>

<a href="/result">
<button type="button">Submit Test</button>
</a>

</div>

<script>

let time = 300;

function startTimer(){

let timer = document.getElementById("timer");

let countdown = setInterval(function(){

let minutes = Math.floor(time / 60);
let seconds = time % 60;

seconds = seconds < 10 ? "0" + seconds : seconds;

timer.innerHTML = minutes + ":" + seconds;

time--;

if(time < 0){

clearInterval(countdown);

alert("Time is up! Submitting test...");

window.location.href = "/result";

}

},1000);

}

startTimer();

</script>

</body>

</html>
